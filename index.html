<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROBOCODE · Stock</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--teal:#003439;--turq:#00DCDE;--turq6:#00ADB3;--pink:#FF00BF;--tan:#FE6611;--bg:#EDFFFE;--line:#bfe9e9;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,'Segoe UI',Inter,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--teal);font-size:14px;}
header{background:var(--teal);color:#EDFFFE;padding:12px 22px;display:flex;align-items:center;gap:18px;}
header .brand{font-weight:800;letter-spacing:1px;font-size:17px;}
header .brand b{color:var(--turq);}
header .who{margin-left:auto;font-size:12px;color:#83FDFF;}
header .role{font-size:10px;text-transform:uppercase;letter-spacing:.08em;background:#0c4a50;padding:2px 8px;border-radius:10px;color:#9fe6dd;}
header button{background:none;border:1px solid #2c5b60;color:#cdeff0;border-radius:7px;padding:5px 10px;cursor:pointer;font-size:12px;}
nav{background:#012a2e;padding:0 22px;display:flex;gap:2px;overflow-x:auto;}
nav a{color:#9fd9d9;padding:11px 14px;cursor:pointer;font-size:13px;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap;}
nav a.on{color:#fff;border-color:var(--turq);}
.wrap{max-width:1180px;margin:0 auto;padding:20px 22px 70px;}
.tw{max-width:620px;}
h2{font-size:18px;margin:0 0 14px;}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px;}
.stats{display:flex;gap:12px;flex-wrap:wrap;}
.stat{flex:1;min-width:130px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;}
.stat .v{font-size:26px;font-weight:800;}
.stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--turq6);}
.stat.s .v{color:var(--turq6);} .stat.l2 .v{color:var(--tan);} .stat.g .v{color:var(--pink);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f1fbfb;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--turq6);border-bottom:2px solid var(--line);}
td{padding:7px 10px;border-bottom:1px solid #eef7f7;}
.urn{font-family:Menlo,Consolas,monospace;font-weight:700;color:var(--turq6);font-size:12px;}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--turq6);font-weight:700;margin:8px 0 3px;}
input,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;color:var(--teal);background:#fff;}
.row{display:flex;gap:12px;flex-wrap:wrap;} .row>div{flex:1;min-width:150px;}
.btn{background:var(--turq6);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;font-size:14px;}
.btn:hover{background:var(--teal);} .btn.pink{background:var(--pink);} .btn.sm{padding:5px 11px;font-size:12px;} .btn.ghost{background:#fff;color:var(--teal);border:1px solid var(--line);}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;}
.msg{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;display:none;}
.msg.ok{background:#e4fbf8;color:#066;border:1px solid #9fe6dd;display:block;}
.msg.err{background:#ffeef0;color:#922;border:1px solid #f5c2c8;display:block;}
.auth{max-width:380px;margin:7vh auto;}
.muted{color:#6a8b8b;font-size:12px;}
.tag{display:inline-block;background:#eef7f7;border-radius:6px;padding:1px 7px;font-size:11px;color:#5a8080;}
.seg{display:flex;gap:6px;margin-bottom:14px;}
.seg button{flex:1;border:1px solid var(--line);background:#fff;color:var(--teal);border-radius:8px;padding:8px;font-weight:700;cursor:pointer;}
.seg button.on{background:var(--teal);color:#fff;border-color:var(--teal);}
</style></head>
<body>
<div id="authView" class="auth" style="display:none;">
  <div class="card">
    <div class="brand" style="font-weight:800;font-size:20px;margin-bottom:10px;">ROBO<span style="color:var(--turq6)">CODE</span> · Stock</div>
    <div class="seg"><button id="segT" class="on" onclick="authMode('teacher')">Teacher</button><button id="segA" onclick="authMode('admin')">Admin</button></div>
    <div id="authMsg" class="msg"></div>
    <div id="teacherForm">
      <label>Username</label><input id="tuser" autocomplete="username">
      <label>Password</label><input id="tpass" type="password" autocomplete="current-password">
      <div style="margin-top:14px;"><button class="btn" onclick="signInTeacher()">Sign in</button></div>
    </div>
    <div id="adminForm" style="display:none;">
      <label>Email</label><input id="email" type="email" autocomplete="username">
      <label>Password</label><input id="pass" type="password" autocomplete="current-password">
      <div style="display:flex;gap:8px;margin-top:14px;"><button class="btn" onclick="signInAdmin()">Sign in</button><button class="btn ghost" onclick="signUpAdmin()">Create account</button></div>
    </div>
  </div>
</div>

<div id="appView" style="display:none;">
  <header>
    <div class="brand">ROBO<b>CODE</b> · Stock</div>
    <span class="role" id="roleBadge"></span>
    <div class="who" id="who"></div>
    <button onclick="signOut()">Sign out</button>
  </header>
  <nav id="nav"></nav>
  <div class="wrap"><div id="msg" class="msg"></div><div id="main"></div></div>
</div>

<script>
const SUPABASE_URL="https://dtggdbcortsnhqepfyem.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z2dkYmNvcnRzbmhxZXBmeWVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODEzNjQsImV4cCI6MjA5NjY1NzM2NH0.NKSmwz8oiJ7ob5I0R_ZMsPWdv-8anff82Jfp2EEkOTs";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const $=id=>document.getElementById(id);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function note(el,t,ok){el.className="msg "+(ok?"ok":"err");el.textContent=t;el.style.display="block";if(ok)setTimeout(()=>el.style.display="none",3500);}

let ROLE=null, ME=null, TUSER=null, TPASS=null, TNAME=null;
let STUDENTS=[], KITS=[], COMPONENTS=[], FRANCHISES=[];
let TLIST={students:[],components:[]};
const COURSES=["ORB 1","ORB 2","ORB 3","ORB 4","ORB 5"];
const TABS=[["dash","Dashboard"],["issue","Issue kit"],["loans","Loans"],["parts","Lost / extra"],["students","Students"],["required","Required stock"],["stock","Stock"],["kits","Kits & cost"],["teachers","Teachers"]];
let TAB="dash";

// ---------- auth ----------
function authMode(m){const t=m==="teacher";$("segT").classList.toggle("on",t);$("segA").classList.toggle("on",!t);$("teacherForm").style.display=t?"block":"none";$("adminForm").style.display=t?"none":"block";$("authMsg").style.display="none";}
async function signInAdmin(){const{error}=await sb.auth.signInWithPassword({email:$("email").value.trim(),password:$("pass").value});if(error)note($("authMsg"),error.message,false);}
async function signUpAdmin(){const{error}=await sb.auth.signUp({email:$("email").value.trim(),password:$("pass").value});note($("authMsg"),error?error.message:"Account created. Confirm email (if on) then sign in.",!error);}
async function signInTeacher(){
  const u=$("tuser").value.trim().toLowerCase(), p=$("tpass").value;
  const{data,error}=await sb.rpc("teacher_login",{p_user:u,p_pass:p});
  if(error){note($("authMsg"),error.message,false);return;}
  if(!data||!data.length){note($("authMsg"),"Wrong username or password.",false);return;}
  TUSER=u;TPASS=p;TNAME=data[0].name||u;ROLE="teacher";
  sessionStorage.setItem("t_user",u);sessionStorage.setItem("t_pass",p);
  route();
}
async function signOut(){
  if(ROLE==="admin"){await sb.auth.signOut();}
  ROLE=null;TUSER=TPASS=null;sessionStorage.removeItem("t_user");sessionStorage.removeItem("t_pass");route();
}
sb.auth.onAuthStateChange((_e,session)=>{if(session){ROLE="admin";ME=session.user;}else if(ROLE==="admin"){ROLE=null;ME=null;}route();});

async function route(){
  if(!ROLE){$("authView").style.display="block";$("appView").style.display="none";return;}
  $("authView").style.display="none";$("appView").style.display="block";
  if(ROLE==="admin"){
    $("roleBadge").textContent="Admin";$("who").textContent=ME.email;
    $("nav").style.display="flex";
    $("nav").innerHTML=TABS.map(([k,l])=>`<a class="${k===TAB?'on':''}" onclick="go('${k}')">${l}</a>`).join("");
    await loadRefs();renderAdmin();
  }else{
    $("roleBadge").textContent="Teacher";$("who").textContent=TNAME;
    $("nav").style.display="none";$("nav").innerHTML="";
    renderTeacher();
  }
}
function go(t){TAB=t;route();}

// ---------- admin ----------
async function loadRefs(){
  const[a,b,c,d]=await Promise.all([
    sb.from("students").select("*, franchises(name)").order("name"),
    sb.from("kits").select("*").order("code"),
    sb.from("components").select("*").order("urn"),
    sb.from("franchises").select("*").order("name")]);
  STUDENTS=a.data||[];KITS=b.data||[];COMPONENTS=c.data||[];FRANCHISES=d.data||[];
}
function renderAdmin(){const m=$("main");
  if(TAB==="dash")return renderDash(m);
  if(TAB==="issue")return renderIssue(m);
  if(TAB==="loans")return renderLoans(m);
  if(TAB==="parts")return renderParts(m);
  if(TAB==="students")return renderStudents(m);
  if(TAB==="required")return renderRequired(m);
  if(TAB==="stock")return renderStock(m);
  if(TAB==="kits")return renderKits(m);
  if(TAB==="teachers")return renderTeachersAdmin(m);
}
function tbl(cols,rows){return `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>`+rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")+`</tbody></table>`;}
function studentOpts(list){return (list||STUDENTS).map(s=>`<option value="${s.id}">${esc(s.name)}${s.current_course?' · '+esc(s.current_course):''}</option>`).join("");}
function compOpts(list){return (list||COMPONENTS).map(c=>`<option value="${c.id}">${esc(c.urn)} · ${esc(c.name)}</option>`).join("");}
function kitOpts(){return KITS.map(k=>`<option value="${k.id}">${esc(k.code)} · ${esc(k.name)}</option>`).join("");}

async function renderDash(m){
  const[{data:stock},{data:loans}]=await Promise.all([sb.from("v_stock").select("*"),sb.from("v_open_loans").select("*")]);
  const sS=stock.reduce((a,r)=>a+r.in_storage,0),sL=stock.reduce((a,r)=>a+r.on_loan,0),sG=stock.reduce((a,r)=>a+r.gone,0);
  const low=stock.filter(r=>r.reorder_level>0&&r.in_storage<=r.reorder_level);
  m.innerHTML=`<h2>Dashboard</h2><div class="stats">
    <div class="stat s"><div class="v">${sS.toLocaleString()}</div><div class="l">units in storage</div></div>
    <div class="stat l2"><div class="v">${sL.toLocaleString()}</div><div class="l">units on loan</div></div>
    <div class="stat g"><div class="v">${sG.toLocaleString()}</div><div class="l">units sold / lost</div></div>
    <div class="stat"><div class="v">${loans.length}</div><div class="l">kits out on loan</div></div></div>
    <div class="card"><h2>Low stock (${low.length})</h2>${low.length?tbl(["URN","Component","In storage","Reorder ≤"],low.map(r=>[`<span class="urn">${r.urn}</span>`,esc(r.name),r.in_storage,r.reorder_level])):'<p class="muted">Nothing below reorder level. Set levels on the Stock tab.</p>'}</div>`;
}
function renderIssue(m){m.innerHTML=`<h2>Issue a kit</h2><div class="card">
    <div class="row"><div><label>Student</label><select id="iStu">${studentOpts()}</select></div><div><label>Kit</label><select id="iKit">${kitOpts()}</select></div></div>
    <div class="row"><div><label>Type</label><select id="iType"><option value="rent">Rent (free loan, returns)</option><option value="buy">Buy (paid, keeps)</option></select></div>
      <div><label>Due back (rent)</label><input id="iDue" type="date"></div><div><label>Price £ (buy)</label><input id="iPrice" type="number" min="0" step="0.01" value="0"></div></div>
    <div style="margin-top:14px;"><button class="btn" onclick="doIssue()">Issue kit</button></div></div>`;}
async function doIssue(){const t=$("iType").value;
  const{error}=await sb.rpc("issue_kit",{p_student:+$("iStu").value,p_kit:+$("iKit").value,p_type:t,p_due:$("iDue").value||null,p_price:t==="buy"?(+$("iPrice").value||0):0,p_staff:ME.email});
  note($("msg"),error?error.message:"Kit issued.",!error);}
async function renderLoans(m){const{data:loans}=await sb.from("v_open_loans").select("*").order("issued_at");
  m.innerHTML=`<h2>Open loans (${loans.length})</h2><div class="card">${loans.length?tbl(["Student","Kit","Franchise","Issued","Due",""],loans.map(l=>[esc(l.student),esc(l.kit_name),esc(l.franchise||''),(l.issued_at||'').slice(0,10),l.due_at||'—',`<button class="btn pink sm" onclick="doReturn(${l.id})">Mark returned</button>`])):'<p class="muted">No kits out on loan.</p>'}</div>`;}
async function doReturn(id){const{error}=await sb.rpc("return_issue",{p_issue:id});note($("msg"),error?error.message:"Returned to storage.",!error);if(!error)renderAdmin();}
async function renderParts(m){const{data:recent}=await sb.from("movements").select("*, components(urn,name)").in("type",["replacement","loss"]).order("occurred_at",{ascending:false}).limit(20);
  m.innerHTML=`<h2>Lost / extra components</h2><div class="card">
    <div class="row"><div><label>Student</label><select id="pStu">${studentOpts()}</select></div><div><label>Component</label><select id="pComp">${compOpts()}</select></div><div><label>Qty</label><input id="pQty" type="number" min="1" value="1"></div></div>
    <div class="row"><div><label>Reason</label><select id="pType"><option value="replacement">Replacement / extra</option><option value="loss">Lost from a loan</option></select></div><div><label>Class</label><input id="pClass"></div><div><label>Teacher</label><input id="pStaff" value="${esc(ME.email)}"></div></div>
    <div><label>Note</label><input id="pNote"></div><div style="margin-top:14px;"><button class="btn" onclick="doPart()">Log it</button></div></div>
    <div class="card"><h2>Recent (20)</h2>${recent&&recent.length?tbl(["When","Class","Component","Qty","Type","Teacher"],recent.map(r=>[(r.occurred_at||'').slice(0,16).replace('T',' '),esc(r.class_label||''),`<span class="urn">${esc(r.components?.urn||'')}</span> ${esc(r.components?.name||'')}`,r.qty,r.type,esc(r.staff||'')])):'<p class="muted">None yet.</p>'}</div>`;}
async function doPart(){const{error}=await sb.from("movements").insert({component_id:+$("pComp").value,qty:+$("pQty").value||1,type:$("pType").value,student_id:+$("pStu").value||null,staff:$("pStaff").value,class_label:$("pClass").value,reason:$("pNote").value});note($("msg"),error?error.message:"Logged.",!error);if(!error)renderAdmin();}
function courseSel(id,val){return `<select onchange="updateCourse(${id},this.value)"><option value=""${val?'':' selected'}>—</option>${COURSES.map(c=>`<option${c===val?' selected':''}>${c}</option>`).join("")}</select>`;}
async function renderStudents(m){m.innerHTML=`<h2>Students (${STUDENTS.length})</h2><div class="card"><div class="row">
    <div><label>Name</label><input id="sName"></div><div><label>Franchise</label><select id="sFr">${FRANCHISES.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join("")}</select></div>
    <div><label>Course</label><select id="sCourse"><option value="">—</option>${COURSES.map(c=>`<option>${c}</option>`).join("")}</select></div>
    <div><label>Parent contact <span class="muted">(optional)</span></label><input id="sContact"></div></div>
    <div style="margin-top:12px;"><button class="btn" onclick="addStudent()">Add student</button></div></div>
    <div class="card">${STUDENTS.length?tbl(["Name","Franchise","Course","Contact",""],STUDENTS.map(s=>[esc(s.name),esc(s.franchises?.name||''),courseSel(s.id,s.current_course),esc(s.parent_contact||''),`<button class="btn pink sm" onclick="deleteStudent(${s.id},'${esc(s.name).replace(/'/g,"")}')">Remove</button>`])):'<p class="muted">No students yet.</p>'}</div>`;}
async function addStudent(){const n=$("sName").value.trim();if(!n){note($("msg"),"Name required.",false);return;}
  const{error}=await sb.from("students").insert({name:n,franchise_id:+$("sFr").value,current_course:$("sCourse").value||null,parent_contact:$("sContact").value||null});note($("msg"),error?error.message:"Added.",!error);if(!error){await loadRefs();renderAdmin();}}
async function updateCourse(id,v){const{error}=await sb.from("students").update({current_course:v||null}).eq("id",id);note($("msg"),error?error.message:"Course updated.",!error);if(!error){await loadRefs();}}
async function deleteStudent(id,name){if(!confirm("Remove "+name+"? Their kit/log history is kept but unlinked."))return;
  const{error}=await sb.from("students").delete().eq("id",id);note($("msg"),error?error.message:"Removed.",!error);if(!error){await loadRefs();renderAdmin();}}
async function renderRequired(m){
  const{data:req}=await sb.from("v_requirements").select("*").order("urn");
  const counts=COURSES.map(c=>[c,STUDENTS.filter(s=>s.current_course===c).length]);
  const short=(req||[]).filter(r=>r.shortfall>0);
  m.innerHTML=`<h2>Required stock</h2>
    <p class="muted">Parts needed to equip every current student once (students per course × that course's kit). Shortfall = required minus what's in storage.</p>
    <div class="stats">${counts.map(([c,n])=>`<div class="stat"><div class="v">${n}</div><div class="l">${c}</div></div>`).join("")}<div class="stat s"><div class="v">${short.length}</div><div class="l">parts short</div></div></div>
    <div class="card">${(req&&req.length)?tbl(["URN","Component","Group","Required","In storage","Shortfall"],
      req.map(r=>[`<span class="urn">${r.urn}</span>`,esc(r.name),`<span class="tag">${esc(r.subgroup||'')}</span>`,r.required,r.in_storage,
        r.shortfall>0?`<b style="color:#922">${r.shortfall}</b>`:'0'])):'<p class="muted">No requirements yet — add students with a course.</p>'}</div>`;
}
async function renderStock(m){const{data:stock}=await sb.from("v_stock").select("*").order("urn");
  m.innerHTML=`<h2>Stock by component (${stock.length})</h2><p class="muted">Storage = on shelf · Loan = out · Gone = sold/lost. Edit reorder + cost.</p>
    <div class="card">${tbl(["URN","Component","Group","Storage","Loan","Gone","Reorder","Cost £"],stock.map(r=>[`<span class="urn">${r.urn}</span>`,esc(r.name),`<span class="tag">${esc(r.subgroup||'')}</span>`,r.in_storage,r.on_loan,r.gone,`<input style="width:60px" type="number" value="${r.reorder_level||0}" onchange="setReorder(${r.id},this.value)">`,`<input style="width:70px" type="number" step="0.01" value="${r.unit_cost||0}" onchange="setCost(${r.id},this.value)">`]))}</div>`;}
async function setReorder(id,v){await sb.from("components").update({reorder_level:+v||0}).eq("id",id);}
async function setCost(id,v){await sb.from("components").update({unit_cost:+v||0}).eq("id",id);}
async function renderKits(m){const{data:kc}=await sb.from("v_kit_cost").select("*").order("code");
  m.innerHTML=`<h2>Kits &amp; course cost</h2><p class="muted">Kit cost = sum of component costs. Set buy price for margin.</p>
    <div class="card">${tbl(["Code","Kit","Audience","Kit cost £","Buy price £","Margin £"],kc.map(k=>[esc(k.code),esc(k.name),esc(k.audience),Number(k.kit_cost).toFixed(2),`<input style="width:80px" type="number" step="0.01" value="${k.buy_price||0}" onchange="setBuy(${k.id},this.value)">`,`<b style="color:${k.buy_margin>=0?'#066':'#922'}">${Number(k.buy_margin).toFixed(2)}</b>`]))}</div>`;}
async function setBuy(id,v){await sb.from("kits").update({buy_price:+v||0}).eq("id",id);if(!isNaN(+v))renderAdmin();}

let TEACHERS=[];
async function renderTeachersAdmin(m){
  const{data:ts}=await sb.from("teachers").select("username,name,active,created_at").order("username");
  TEACHERS=ts||[];
  const rows=TEACHERS.map(t=>{const u=t.username;
    const acts=`<button class="btn ghost sm" onclick="renameTeacher('${u}')">Rename</button> `+
      `<button class="btn ghost sm" onclick="resetTeacherPw('${u}')">Reset PW</button> `+
      `<button class="btn ghost sm" onclick="toggleTeacher('${u}')">${t.active?'Disable':'Enable'}</button> `+
      `<button class="btn pink sm" onclick="deleteTeacher('${u}')">Delete</button>`;
    return [`<span class="urn">${esc(u)}</span>`,esc(t.name||''),t.active?'yes':'no',(t.created_at||'').slice(0,10),acts];});
  m.innerHTML=`<h2>Teacher accounts</h2><p class="muted">Create logins for teachers. No email needed. They can only log component takings.</p>
    <div class="card"><div class="row"><div><label>Username</label><input id="tnU"></div><div><label>Name</label><input id="tnN"></div><div><label>Password</label><input id="tnP" type="text"></div></div>
    <div style="margin-top:12px;"><button class="btn" onclick="addTeacher()">Create teacher</button></div></div>
    <div class="card">${TEACHERS.length?tbl(["Username","Name","Active","Created",""],rows):'<p class="muted">No teachers yet.</p>'}</div>`;
}
async function addTeacher(){
  const u=$("tnU").value.trim(),p=$("tnP").value,n=$("tnN").value.trim();
  if(!u||!p){note($("msg"),"Username and password required.",false);return;}
  const{error}=await sb.rpc("create_teacher",{p_user:u,p_pass:p,p_name:n});
  note($("msg"),error?error.message:"Teacher created.",!error);if(!error)renderAdmin();
}
function teacherName(u){const t=TEACHERS.find(x=>x.username===u);return t?(t.name||""):"";}
async function renameTeacher(u){const n=prompt("Name for "+u+":",teacherName(u));if(n===null)return;
  const{error}=await sb.from("teachers").update({name:n}).eq("username",u);note($("msg"),error?error.message:"Renamed.",!error);if(!error)renderAdmin();}
async function resetTeacherPw(u){const p=prompt("New password for "+u+":");if(!p)return;
  const{error}=await sb.rpc("admin_set_teacher_password",{p_user:u,p_newpass:p});note($("msg"),error?error.message:"Password reset.",!error);}
async function toggleTeacher(u){const t=TEACHERS.find(x=>x.username===u);
  const{error}=await sb.from("teachers").update({active:!t.active}).eq("username",u);note($("msg"),error?error.message:"Updated.",!error);if(!error)renderAdmin();}
async function deleteTeacher(u){if(!confirm("Delete teacher "+u+"? Their past log entries stay."))return;
  const{error}=await sb.from("teachers").delete().eq("username",u);note($("msg"),error?error.message:"Deleted.",!error);if(!error)renderAdmin();}

// ---------- teacher view ----------
async function renderTeacher(){
  const m=$("main");m.innerHTML=`<div class="tw"><p class="muted">Loading…</p></div>`;
  const{data,error}=await sb.rpc("teacher_lists",{p_user:TUSER,p_pass:TPASS});
  if(error){note($("msg"),error.message,false);return;}
  TLIST=data;
  await drawTeacher();
}
async function drawTeacher(){
  const{data:recent}=await sb.rpc("teacher_recent",{p_user:TUSER,p_pass:TPASS});
  $("main").innerHTML=`<div class="tw"><h2>Log a component</h2>
    <div class="card">
      <div class="row"><div><label>Student</label><select id="lStu">${studentOpts(TLIST.students)}</select></div><div><label>Qty</label><input id="lQty" type="number" min="1" value="1"></div></div>
      <label>Component</label><select id="lComp">${compOpts(TLIST.components)}</select>
      <div class="row"><div><label>Reason</label><select id="lType"><option value="replacement">Replacement / extra</option><option value="loss">Lost</option></select></div><div><label>Class</label><input id="lClass" placeholder="e.g. Sat AM ORB1"></div></div>
      <label>Note (optional)</label><input id="lNote">
      <div style="margin-top:14px;"><button class="btn" onclick="doTeacherLog()">Log it</button></div>
    </div>
    <div class="card"><h2>My recent log</h2>${recent&&recent.length?tbl(["When","Student","Component","Qty","Type"],recent.map(r=>[(r.occurred_at||'').slice(0,16).replace('T',' '),esc(r.student||''),`<span class="urn">${esc(r.urn||'')}</span> ${esc(r.component||'')}`,r.qty,r.type])):'<p class="muted">Nothing logged yet.</p>'}</div>
    <div class="card"><h2>Change my password</h2>
      <div class="row"><div><label>Current password</label><input id="cpOld" type="password"></div><div><label>New password</label><input id="cpNew" type="password"></div></div>
      <div style="margin-top:12px;"><button class="btn ghost" onclick="doChangePw()">Update password</button></div></div></div>`;
}
async function doTeacherLog(){
  const{error}=await sb.rpc("teacher_log",{p_user:TUSER,p_pass:TPASS,p_student:+$("lStu").value||null,p_component:+$("lComp").value,p_qty:+$("lQty").value||1,p_type:$("lType").value,p_class:$("lClass").value,p_reason:$("lNote").value});
  note($("msg"),error?error.message:"Logged. Thank you.",!error);
  if(!error)drawTeacher();
}
async function doChangePw(){
  const o=$("cpOld").value,n=$("cpNew").value;
  if(!o||!n){note($("msg"),"Fill both password fields.",false);return;}
  const{error}=await sb.rpc("teacher_change_password",{p_user:TUSER,p_oldpass:o,p_newpass:n});
  if(error){note($("msg"),error.message,false);return;}
  TPASS=n;sessionStorage.setItem("t_pass",n);
  note($("msg"),"Password updated.",true);drawTeacher();
}

// ---------- init ----------
(async()=>{
  const{data}=await sb.auth.getSession();
  if(data.session){ROLE="admin";ME=data.session.user;}
  else{const u=sessionStorage.getItem("t_user"),p=sessionStorage.getItem("t_pass");
    if(u&&p){const{data:r,error}=await sb.rpc("teacher_login",{p_user:u,p_pass:p});if(!error&&r&&r.length){ROLE="teacher";TUSER=u;TPASS=p;TNAME=r[0].name||u;}}}
  route();
})();
</script>
</body></html>
